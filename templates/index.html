<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoFly Planner</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script>
        window.USER_ROLE = "{{ user_role }}";
        window.MAPBOX_TOKEN = "{{ MAPBOX_TOKEN }}";
    </script> 
    <script src="/static/app.js" defer></script>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-[1000]">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-bold text-slate-800">🧭 NoFly <span class="text-slate-400 font-light">Planner</span></h1>
            
            <nav class="flex bg-slate-100 p-1 rounded-lg">
                <button onclick="switchView('map')" class="view-btn px-4 py-1.5 rounded-md text-sm font-medium transition-all bg-white shadow-sm text-blue-600" id="btn-map">Map</button>
                <button onclick="switchView('table')" class="view-btn px-4 py-1.5 rounded-md text-sm font-medium transition-all text-slate-500" id="btn-table">Table</button>
                <button onclick="switchView('calendar')" class="view-btn px-4 py-1.5 rounded-md text-sm font-medium transition-all text-slate-500" id="btn-calendar">Calendar</button>
            </nav>

            <div class="flex items-center gap-2 border-l pl-8 ml-2 border-slate-200">
                <label for="trip-selector" class="text-xs font-bold uppercase tracking-wider text-slate-400">Voyage:</label>
                <select id="trip-selector" 
                        onchange="switchTrip(this.value)"
                        class="bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5 text-sm font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer">
                    </select>
                
                <button onclick="createNewTripPrompt()" 
                        class="admin-only p-1.5 text-blue-600 hover:bg-blue-50 rounded-full transition-colors tooltip"
                        title="Nouveau voyage">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div id="status" class="text-sm text-green-600 font-medium">● Connected</div>
        </div>
    </header>

    <main id="view-map" class="view-container active flex flex-col md:flex-row p-2 md:p-4 gap-4">
        <aside class="w-full md:w-96 bg-white rounded-xl shadow-md border border-slate-200 order-2 md:order-1 sidebar-scroll relative">
            <div class="sticky-search p-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Ajouter à la fin</label>
                <div class="relative">
                    <input type="text" id="city-search" placeholder="Rechercher (ex: Bangkok)" 
                        class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-base"> 
                    <div id="autocomplete-results" class="absolute z-10 w-full bg-white border rounded-b-lg shadow-xl hidden max-h-60 overflow-y-auto"></div>
                </div>
            </div>

            <div class="mb-4 mx-4 p-3 bg-blue-50 rounded-lg border border-blue-100">
                <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1">Date de départ</label>
                <input type="date" id="trip-start-date" value="2026-03-07" 
                    class="w-full bg-white border-none rounded text-sm p-1 outline-none"
                    onchange="calculateItineraryDates()">
            </div>

            <div id="itinerary-list" class="space-y-1 px-4 pb-4"></div>
        </aside>

        <section class="flex-1 relative order-1 md:order-2">
            <div id="map" class="rounded-xl shadow-lg border border-slate-200"></div>
        </section>
    </main>

    <div id="view-table" class="view-container bg-white overflow-auto hidden">
        <table class="w-full sheet-table">
        <thead>
                <tr class="bg-slate-50 border-b text-slate-500 uppercase text-[11px] tracking-wider">
                <th class="w-12 py-4 text-center">#</th>
                <th class="text-left">Ville</th>
                <th class="text-left">Pays</th>
                <th class="text-left">Date d'arrivée</th>
                <th class="text-left">Nuits</th>
                <th class="text-left">Transport</th>
                <th class="text-left">Météo</th>
                <th class="text-left">Notes</th>
            </tr>
        </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="view-calendar" class="view-container bg-white p-6 hidden">
        <div id="calendar-el" class="h-full"></div>
    </div>

    <div id="inline-search-modal" class="hidden absolute bg-white shadow-2xl border border-slate-200 rounded-lg p-3 z-[2000] w-72">
        <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-bold text-slate-500">Insérer une étape</span>
            <button onclick="cancelInlineSearch()" class="text-slate-400 hover:text-red-500">✕</button>
        </div>
        <input type="text" id="inline-search-input" placeholder="Rechercher une ville..." class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm">
        <div id="inline-autocomplete-results" class="w-full bg-white border mt-1 rounded shadow-lg hidden max-h-48 overflow-y-auto"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</body>
</html>
